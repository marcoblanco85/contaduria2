<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Contable</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; background: #fff; }
        .main { display: flex; height: 100vh; width: 100%; }
        #left { flex: 1; padding: 20px; overflow-y: auto; border-right: 1px solid #ccc; }
        #right { width: 380px; height: 100%; background: #eee; }
        iframe { width: 100%; height: 100%; border: none; }
        .tasa-box { background: #003366; color: white; padding: 15px; border-radius: 4px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .tasa-val { font-size: 1.5em; font-weight: bold; }
        .f-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .res { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 4px; border-left: 4px solid #003366; }
        .up { color: green; font-weight: bold; }
        .down { color: red; font-weight: bold; }
    </style>
</head>
<body>
<div class="main">
    <div id="left">
        <div class="tasa-box">
            <span>BCV Oficial</span>
            <div id="rate-txt" class="tasa-val">Cargando...</div>
        </div>
        <div class="f-row">
            <input type="text" id="desc" placeholder="Concepto">
            <input type="number" id="amt" placeholder="Monto $">
            <select id="op">
                <option value="1">Ingreso (+)</option>
                <option value="0">Egreso (-)</option>
            </select>
            <button onclick="add()">Añadir</button>
        </div>
        <table>
            <thead><tr><th>Detalle</th><th>USD</th><th>Bs.</th></tr></thead>
            <tbody id="logs"></tbody>
        </table>
        <div class="res">
            Balance USD: <span id="tot-u">$0.00</span><br>
            Equiv. Bs: <span id="tot-b">0.00</span>
        </div>
    </div>
    <div id="right">
        <iframe src="https://alcambio.app"></iframe>
    </div>
</div>
<script>
    let rate = 0;
    let balance = 0;

    async function getRate() {
        // Usamos un proxy para saltar el bloqueo de GitHub
        const url = 'https://api.allorigins.win' + encodeURIComponent('https://ve.dolarapi.com');
        
        try {
            const r = await fetch(url);
            const d = await r.json();
            const data = JSON.parse(d.contents);
            rate = data.promedio;
            document.getElementById('rate-txt').innerText = rate.toFixed(2) + " Bs.";
        } catch (e) {
            // Si falla el proxy, intentamos directo como respaldo
            try {
                const r2 = await fetch('https://ve.dolarapi.com');
                const d2 = await r2.json();
                rate = d2.promedio;
                document.getElementById('rate-txt').innerText = rate.toFixed(2) + " Bs.";
            } catch (e2) {
                document.getElementById('rate-txt').innerText = "Error de conexión";
            }
        }
    }

    function add() {
        const d = document.getElementById('desc').value;
        const a = parseFloat(document.getElementById('amt').value);
        const o = document.getElementById('op').value;
        if (!d || isNaN(a) || rate === 0) return;

        const val = o == "1" ? a : -a;
        balance += val;

        const row = `<tr><td>${d}</td><td class="${o == '1' ? 'up':'down'}">${val.toFixed(2)}</td><td>${(val * rate).toFixed(2)}</td></tr>`;
        document.getElementById('logs').innerHTML += row;
        document.getElementById('tot-u').innerText = "$" + balance.toFixed(2);
        document.getElementById('tot-u').className = balance >= 0 ? 'up' : 'down';
        document.getElementById('tot-b').innerText = (balance * rate).toFixed(2);

        document.getElementById('desc').value = '';
        document.getElementById('amt').value = '';
    }

    getRate();
    setInterval(getRate, 300000); // Actualiza cada 5 min
</script>
</body>
</html>
