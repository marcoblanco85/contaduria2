<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control Contable - Automatizado</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; background: #fff; }
        .main { display: flex; height: 100vh; width: 100%; }
        #left { flex: 1; padding: 20px; overflow-y: auto; border-right: 1px solid #ccc; }
        #right { width: 380px; height: 100%; background: #f0f0f0; }
        iframe { width: 100%; height: 100%; border: none; }
        .tasa-box { background: #004085; color: white; padding: 15px; border-radius: 4px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .tasa-val { font-size: 1.5em; font-weight: bold; cursor: pointer; }
        .f-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .res { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 4px; border-left: 4px solid #004085; }
        .up { color: green; font-weight: bold; }
        .down { color: red; font-weight: bold; }
        .small-info { font-size: 0.7em; opacity: 0.8; display: block; }
    </style>
</head>
<body>
<div class="main">
    <div id="left">
        <div class="tasa-box">
            <div>
                <span>Dólar BCV</span>
                <span class="small-info" id="fecha-txt">Sincronizando...</span>
            </div>
            <div id="rate-txt" class="tasa-val" onclick="manual()">cargando...</div>
        </div>
        <div class="f-row">
            <input type="text" id="desc" placeholder="Concepto">
            <input type="number" id="amt" placeholder="Monto $">
            <select id="op">
                <option value="1">Ingreso (+)</option>
                <option value="0">Egreso (-)</option>
            </select>
            <button onclick="add()">Añadir</button>
        </div>
        <table>
            <thead><tr><th>Detalle</th><th>USD</th><th>Bs.</th></tr></thead>
            <tbody id="logs"></tbody>
        </table>
        <div class="res">
            Balance USD: <span id="tot-u">$0.00</span><br>
            Equiv. Bs: <span id="tot-b">0.00</span>
        </div>
    </div>
    <div id="right">
        <iframe src="https://alcambio.app"></iframe>
    </div>
</div>

<script>
    let rate = 0;
    let balance = 0;

    // Función actualizada con el endpoint específico
    function getRate() {
        fetch('https://ve.dolarapi.com/v1/dolares/oficial')
        .then(response => {
            if (!response.ok) throw new Error('Error en red');
            return response.json();
        })
        .then(data => {
            // Dolar API usa el campo 'promedio' para el valor oficial
            rate = data.promedio;
            document.getElementById('rate-txt').innerText = rate.toFixed(2);
            document.getElementById('rate-txt').style.color = "white";
            
            // Opcional: Mostrar fecha de actualización
            const fecha = new Date(data.fechaActualizacion);
            document.getElementById('fecha-txt').innerText = "Act: " + fecha.toLocaleDateString();
        })
        .catch(err => {
            console.error("Error API:", err);
            document.getElementById('rate-txt').innerText = "ERROR API";
            document.getElementById('rate-txt').style.color = "#ffc107";
            alert("No se pudo obtener la tasa automáticamente. Haz clic en el recuadro azul para ingresarla manualmente.");
        });
    }

    function manual() {
        let val = prompt("Ingresa la tasa manualmente:");
        if(val) {
            rate = parseFloat(val.replace(',', '.'));
            document.getElementById('rate-txt').innerText = rate.toFixed(2);
            document.getElementById('rate-txt').style.color = "white";
            document.getElementById('fecha-txt').innerText = "Manual";
        }
    }

    function add() {
        const d = document.getElementById('desc').value;
        const a = parseFloat(document.getElementById('amt').value);
        const o = document.getElementById('op').value;
        
        if (!d || isNaN(a)) return alert("Completa el concepto y el monto");
        if (rate === 0) return alert("Espera a que cargue la tasa o ingrésala manualmente");

        const valUsd = o == "1" ? a : -a;
        balance += valUsd;

        const row = `<tr>
            <td>${d}</td>
            <td class="${o == '1' ? 'up':'down'}">${valUsd.toFixed(2)}</td>
            <td>${(valUsd * rate).toFixed(2)}</td>
        </tr>`;
        
        document.getElementById('logs').innerHTML += row;
        document.getElementById('tot-u').innerText = "$" + balance.toFixed(2);
        document.getElementById('tot-u').className = balance >= 0 ? 'up' : 'down';
        document.getElementById('tot-b').innerText = (balance * rate).toLocaleString('es-VE', {minimumFractionDigits: 2});

        document.getElementById('desc').value = '';
        document.getElementById('amt').value = '';
    }

    window.onload = getRate;
</script>
</body>
</html>
